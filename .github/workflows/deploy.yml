name: Deploy PHP Site (FTP)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          missing=0
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_PORT REMOTE_PATH; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is missing"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Validate deployable PHP app files
        shell: bash
        run: |
          if [ ! -f "index.php" ]; then
            echo "::error::index.php is missing at repo root."
            exit 1
          fi
          if [ ! -f "css/style.css" ] || [ ! -f "js/app.js" ]; then
            echo "::error::css/style.css and js/app.js must exist."
            exit 1
          fi

      - name: Generate deploy metadata
        shell: bash
        run: |
          TS="$(date -u '+%b %d, %Y %H:%M UTC')"
          cat > deploy-meta.json <<EOF
          {
            "last_deployed_at": "$TS",
            "source": "github_actions",
            "run_id": "${{ github.run_id }}",
            "sha": "${{ github.sha }}"
          }
          EOF

      - name: Generate Lichess API config (server-only)
        shell: bash
        env:
          LICHESS_SECRET: ${{ secrets.LICHESS_SECRET }}
        run: |
          mkdir -p api
          cat > api/lichess-config.php <<EOF
          <?php
          declare(strict_types=1);

          return [
              'token' => '${LICHESS_SECRET}',
          ];
          EOF

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.REMOTE_PATH }}/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/.venv/**
            **/venv/**
            **/_django/**
            **/__pycache__/**
            **/*.pyc
            **/*.pyo
            **/*.sqlite3
            **/db.sqlite3
            **/.pytest_cache/**
            **/.mypy_cache/**
            **/.ruff_cache/**
            **/node_modules/**
            **/staticfiles/**
            **/.env
            **/.env.*
            **/README.md

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "### FTP deploy complete"
            echo ""
            echo "- Remote path: \`${{ secrets.REMOTE_PATH }}\`"
            echo "- Uploaded PHP/HTML/CSS/JS app files"
            echo "- Legacy Django code under \`_django/\` is excluded from deployment"
          } >> "$GITHUB_STEP_SUMMARY"
